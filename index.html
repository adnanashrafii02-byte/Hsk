  #header .count { font-size: 11px; color: #6a8ab0; margin-bottom: 8px; }
  #search {
    width: 100%; padding: 8px 16px; border-radius: 30px;
    border: 1.5px solid rgba(201,168,76,0.3);
    background: rgba(255,255,255,0.06); color: #fff;
    font-size: 13px; outline: none; font-family: inherit;

    flex-shrink: 0;
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

    flex: 1; padding: 10px 0; text-align: center;
    font-size: 13px; color: rgba(255,255,255,0.4);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: #c9a84c; border-bottom: 2px solid #c9a84c; }

  /* ── SCROLL AREA ── */
  #content {
    flex: 1; overflow-y: auto; padding: 10px 10px 20px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── VOCAB CARD ── */
  .card {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; margin-bottom: 7px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    transition: background 0.15s;
  }
  .card:active { background: rgba(201,168,76,0.08) !important; }
  .card.even { background: rgba(255,255,255,0.035); }
  .card.odd  { background: rgba(255,255,255,0.018); }
  .card.num-even { background: rgba(201,168,76,0.05); border-color: rgba(201,168,76,0.1); }
  .card.num-odd  { background: rgba(255,255,255,0.02); border-color: rgba(201,168,76,0.06); }

  .serial { min-width: 24px; font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; font-family: monospace; }
  .zh {
    min-width: 88px; text-align: center; font-size: 58px; font-weight: 300;
    font-family: 'Noto Sans SC','Microsoft YaHei','SimHei',Arial,sans-serif;
    color: #fff; line-height: 1;
    background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 12px; padding: 8px 6px; flex-shrink: 0;
  }
  .zh.num { font-size: 46px; min-width: 80px; }
  .info { flex: 1; min-width: 0; }
  .pinyin { font-size: 15px; color: #fff; font-style: italic; margin-bottom: 2px; letter-spacing: 0.4px; }
  .bangla { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 2px; line-height: 1.2; }
  .english { font-size: 12px; color: rgba(255,255,255,0.6); font-style: italic; }
  .playbtn {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.5);
    background: rgba(201,168,76,0.1); color: #c9a84c;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .playbtn:active { background: rgba(201,168,76,0.25); transform: scale(0.93); }

  /* ── SECTION HEADER ── */
  .section-header {
    text-align: center; padding: 20px 0 14px;
    border-top: 1px solid rgba(201,168,76,0.2); margin-top: 8px;

  /* ── MODAL ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;

    padding: 16px; backdrop-filter: blur(6px);

    background: rgba(255,255,255,0.03);
    margin-bottom: 12px;

  #modal-iframe { width: 100%; height: 100%; border: none; display: block; }
  #modal-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .mbtn {
    padding: 8px 18px; border-radius: 30px; font-size: 13px;
    cursor: pointer; font-family: inherit; border: none;

  .mbtn:active { opacity: 0.7; }

  #install-banner {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;

</div>

<div id="tabs">

  <div class="tab" onclick="switchTab('numbers')">🔢 সংখ্যা ১-২০</div>

<!-- Modal -->

    <div id="modal-sub"></div>
    <div id="modal-counter"></div>
    <div id="modal-iframe-wrap">

    </div>

  </div>

<div id="install-banner">

  <button onclick="installApp()">Install করুন</button>

let currentTab = 'vocab';
let modalChars = [], modalIdx = 0, modalPinyin = '', modalBangla = '';
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='vocab') || (i===1 && tab==='numbers'));
  });
  document.getElementById('search').value = '';
  renderContent(tab === 'vocab' ? vocab : numbers, tab);
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const data = currentTab === 'vocab' ? vocab : numbers;
  const filtered = q ? data.filter(r => r.some(v => v.toLowerCase().includes(q))) : data;
  renderContent(filtered, currentTab);
}

function renderContent(data, tab) {
  const el = document.getElementById('content');
  document.getElementById('count-label').textContent = data.length + ' / ' + (tab==='vocab'?vocab:numbers).length + ' টি';

  if (data.length === 0) {
    el.innerHTML = '<div class="empty">কোনো শব্দ পাওয়া যায়নি</div>';
    return;
  }

  let html = '';
  if (tab === 'numbers') {
    html += `<div class="section-header">
      <div class="slabel">✦ সংখ্যা ✦</div>
      <h2>চীনা সংখ্যা ১ – ২০</h2>
      <p>Chinese numbers · ▶ চাপলে লেখার ক্রম দেখবে</p>
    </div>`;
  }

  data.forEach(([zh, py, en, bn], i) => {
    const isNum = tab === 'numbers';
    const cls = isNum ? (i%2===0?'num-even':'num-odd') : (i%2===0?'even':'odd');
    const bangla = isNum ? en : bn;
    const english = isNum ? '' : en;
    html += `<div class="card ${cls}">
      <div class="serial">${i+1}</div>
      <div class="zh${isNum?' num':''}">${zh}</div>
      <div class="info">
        <div class="pinyin">${py}</div>
        <div class="bangla">${bangla}</div>
        ${english ? `<div class="english">${english}</div>` : ''}
      </div>
      <button class="playbtn" onclick="openModal('${zh.replace(/'/g,"\\'")}','${py.replace(/'/g,"\\'")}','${bangla.replace(/'/g,"\\'")}')">▶</button>
    </div>`;
  });

  el.innerHTML = html;
}

function openModal(zh, py, bn) {
  modalChars = zh.split('').filter(c => c.trim());
  modalIdx = 0;
  modalPinyin = py;
  modalBangla = bn;
  document.getElementById('modal-overlay').classList.add('open');
  renderModal();
}

function renderModal() {
  const ch = modalChars[modalIdx];

  // Highlight active char
  const wordHtml = modalChars.map((c,i) =>
    `<span style="color:${i===modalIdx?'#fff':'rgba(255,255,255,0.22)'};transition:color 0.2s">${c}</span>`
  ).join('');
  document.getElementById('modal-word').innerHTML = wordHtml;
  document.getElementById('modal-sub').textContent = modalPinyin + ' · ' + modalBangla;
  document.getElementById('modal-counter').textContent = modalChars.length > 1 ? (modalIdx+1)+' / '+modalChars.length : '';

  // Build iframe HTML
  const ihtml = `<!DOCTYPE html><html><head><meta charset="utf-8"/>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#0d0820;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;}</style>
</head><body><div id="t"></div>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"><\/script>
<script>window.onload=function(){try{var w=HanziWriter.create('t','${ch}',{width:210,height:210,padding:14,strokeColor:'#ffffff',radicalColor:'#c9a84c',outlineColor:'rgba(255,255,255,0.18)',strokeAnimationSpeed:0.9,delayBetweenStrokes:300});w.animateCharacter();window.replay=function(){w.animateCharacter()};}catch(e){}}<\/script>
</body></html>`;

  const iframe = document.getElementById('modal-iframe');
  iframe.srcdoc = ihtml;

  // Buttons
  const btns = document.getElementById('modal-btns');
  let b = '';
  if (modalChars.length > 1) {
    b += `<button class="mbtn mbtn-nav" onclick="navModal(-1)" ${modalIdx===0?'disabled':''}>◀ আগে</button>`;
    b += `<button class="mbtn mbtn-gold" onclick="replayModal()">🔄</button>`;
    b += `<button class="mbtn mbtn-nav" onclick="navModal(1)" ${modalIdx===modalChars.length-1?'disabled':''}>পরে ▶</button>`;
    b += `<br style="width:100%">`;
  } else {
    b += `<button class="mbtn mbtn-gold" onclick="replayModal()">🔄 আবার দেখো</button>`;
  }
  b += `<button class="mbtn mbtn-white" onclick="closeModal()">✕ বন্ধ</button>`;
  btns.innerHTML = b;
}

function navModal(dir) {
  modalIdx = Math.max(0, Math.min(modalChars.length-1, modalIdx+dir));
  renderModal();
}
function replayModal() {
  try { document.getElementById('modal-iframe').contentWindow.replay(); } catch(e) {}
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// Init
renderContent(vocab, 'vocab');

  `;
  const blob = new Blob([sw], {type:'application/javascript'});

}
